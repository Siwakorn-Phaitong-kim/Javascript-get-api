<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Get APi</title>
</head>
<body>
    <h1>My shop</h1>

    <div id="showProd"></div>


    <script>

        let allProd = [];
        async function listProd() {
            try {
                const api = await fetch('http://localhost:3000/products');
                allProd = await api.json();
                disPlay(allProd);
                console.log('Success api = ' ,api.url);
            }catch(error) {
                console.error('error', error)
            }

           function disPlay(data) {
                const container = document.getElementById('showProd');
                container.innerHTML = "";

                data.forEach(item => {
                    container.innerHTML += ` 

                            <div>
                            <img src="${item.image}">
                            <h4>${item.title}</h4>
                            <p>${item.price}</p>
                            </div>
                    
                    `
                });
            }
        }
    listProd();
    </script>
</body>
</html>
